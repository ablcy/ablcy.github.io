<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="128" y1="16" x2="128" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="384" y1="16" x2="384" y2="496"/>
    <line x1="16" y1="128" x2="496" y2="128"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="384" x2="496" y2="384"/>
  </g>
  <!-- Letter Y — geometric, angular, tech-inspired -->
  <g fill="none" stroke="url(#glyph)" stroke-width="36" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Left arm of Y -->
    <line x1="148" y1="148" x2="256" y2="290"/>
    <!-- Right arm of Y -->
    <line x1="364" y1="148" x2="256" y2="290"/>
    <!-- Stem of Y -->
    <line x1="256" y1="290" x2="256" y2="400"/>
  </g>
  <!-- Small accent dot — tech/circuit feel -->
  <circle cx="256" cy="290" r="12" fill="#e0e7ff" opacity="0.9"/>
  <!-- Tiny corner accent — like a circuit node -->
  <circle cx="148" cy="148" r="8" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="364" cy="148" r="8" fill="#e0e7ff" opacity="0.5"/>
  <!-- Bottom terminal accent -->
  <circle cx="256" cy="400" r="8" fill="#e0e7ff" opacity="0.5"/>
</svg>
