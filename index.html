    <script>
        const html = document.documentElement;

        // === 语言切换 ===
        let lang = localStorage.getItem('lang') || 'zh';

        function setLang(l) {
            lang = l;
            localStorage.setItem('lang', l);
            html.setAttribute('lang', l === 'zh' ? 'zh-CN' : 'en');
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute('data-' + l);
            });
            document.querySelector('.lang-text').textContent = l === 'zh' ? 'EN' : '中';
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            setLang(lang === 'zh' ? 'en' : 'zh');
        });

        setLang(lang);

        // === 主题切换 ===
        const saved = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', saved);
        updateThemeIcon();

        document.getElementById('themeToggle').addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon();
            // 同步 Waline 暗色模式
            if (window.walineInstance) {
                walineInstance.update({ dark: next === 'dark' });
            }
        });

        function updateThemeIcon() {
            const isDark = html.getAttribute('data-theme') === 'dark';
            document.querySelector('.theme-icon').textContent = isDark ? '🌙' : '☀️';
        }

        // 导航高亮
        const sections = document.querySelectorAll('.section');
        const navLinks = document.querySelectorAll('.nav-link');

        window.addEventListener('scroll', () => {
            let current = '';
            sections.forEach(sec => {
                const top = sec.offsetTop - 120;
                if (window.scrollY >= top) current = sec.getAttribute('id');
            });
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === '#' + current) link.classList.add('active');
            });
        });

        // 滚动入场动画
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.section, .hero').forEach(el => observer.observe(el));

        // 项目卡片逐个入场
        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const cards = entry.target.querySelectorAll('.project-card');
                    cards.forEach((card, i) => {
                        setTimeout(() => card.classList.add('visible'), i * 80);
                    });
                    cardObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        const grid = document.querySelector('.projects-grid');
        if (grid) cardObserver.observe(grid);

        // Waline 初始化由 module script 处理
        window.initWaline = function(Waline) {
            window.walineInstance = Waline.init({
                el: '#waline',
                serverURL: 'https://waline.luckyan.dpdns.org',
                lang: lang === 'zh' ? 'zh-CN' : 'en',
                dark: html.getAttribute('data-theme') === 'dark',
                meta: ['nick', 'mail'],
                requiredMeta: [],
                login: 'disable',
                wordLimit: [0, 500],
                pageSize: 10,
            });

            // 语言切换时同步 Waline 语言
            const origSetLang = setLang;
            setLang = function(l) {
                origSetLang(l);
                if (window.walineInstance) {
                    walineInstance.update({ lang: l === 'zh' ? 'zh-CN' : 'en' });
                }
            };
        };
    </script>
    <script type="module">
        import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
        window.initWaline({ init });
    </script>
