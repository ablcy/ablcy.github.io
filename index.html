<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckYan - 项目导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">
                <svg viewBox="0 0 100 100" width="80" height="80">
                    <defs>
                        <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#8b5cf6"/>
                            <stop offset="100%" style="stop-color:#06b6d4"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="48" fill="url(#avatarGrad)"/>
                    <text x="50" y="65" text-anchor="middle" fill="white" font-size="36" font-weight="bold" font-family="system-ui">Y</text>
                </svg>
            </div>
            <h1 class="name">LuckYan</h1>
            <p class="bio">个人项目合集</p>
        </header>

        <main class="projects">
            <a href="https://ablcy.github.io/yanai" class="project-card" data-color="purple">
                <div class="card-icon">🤖</div>
                <div class="card-info">
                    <h2>YanAI</h2>
                    <p>免费 AI 工具合集，60+ 款精选工具</p>
                </div>
                <div class="card-arrow">→</div>
            </a>

            <a href="https://ablcy.github.io/yanlink" class="project-card" data-color="cyan">
                <div class="card-icon">🔗</div>
                <div class="card-info">
                    <h2>YanLink</h2>
                    <p>短链接生成器，自定义别名与点击统计</p>
                </div>
                <div class="card-arrow">→</div>
            </a>

            <a href="https://ablcy.github.io/yantravel" class="project-card" data-color="blue">
                <div class="card-icon">🌍</div>
                <div class="card-info">
                    <h2>YanTravel</h2>
                    <p>全球景点推荐，36 个精选目的地</p>
                </div>
                <div class="card-arrow">→</div>
            </a>

            <a href="https://ablcy.github.io/yanread" class="project-card" data-color="green">
                <div class="card-icon">📚</div>
                <div class="card-info">
                    <h2>YanRead</h2>
                    <p>阅读相关工具与资源</p>
                </div>
                <div class="card-arrow">→</div>
            </a>

            <a href="https://ablcy.github.io/yanmusic" class="project-card" data-color="pink">
                <div class="card-icon">🎵</div>
                <div class="card-info">
                    <h2>YanMusic</h2>
                    <p>免费音乐播放器，搜索即听</p>
                </div>
                <div class="card-arrow">→</div>
            </a>

            <a href="https://ablcy.github.io/yanfire" class="project-card" data-color="orange">
                <div class="card-icon">🔥</div>
                <div class="card-info">
                    <h2>YanFire</h2>
                    <p>FIRE 生活推广，财务自由计算器</p>
                </div>
                <div class="card-arrow">→</div>
            </a>

            <a href="https://ablcy.github.io/yanbookmark" class="project-card" data-color="teal">
                <div class="card-icon">🔖</div>
                <div class="card-info">
                    <h2>YanBookmark</h2>
                    <p>书签管理平台，189 个精选收藏</p>
                </div>
                <div class="card-arrow">→</div>
            </a>
        </main>

        <footer>
            <div class="external-links">
                <a href="https://github.com/ablcy" target="_blank" rel="noopener">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                    GitHub
                </a>
            </div>
            <p class="copyright">© 2026 LuckYan</p>
        </footer>
    </div>

    <script>
        // 主题切换
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);

        // 卡片入场动画
        const cards = document.querySelectorAll('.project-card');
        cards.forEach((card, i) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 200 + i * 100);
        });
    </script>
</body>
</html>
